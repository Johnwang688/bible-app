<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logos Light</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #fafaf8;
      color: #1a1a1a;
      min-height: 100vh;
      /* room for fixed top + bottom chrome */
      padding-top: 52px;
      padding-bottom: 72px;
    }

    /* ── Shared chrome transition ─────────────────────────────────────────── */
    .chrome-hide-top    { transform: translateY(-110%) !important; }
    .chrome-hide-bottom { transform: translateY(110%)  !important; }

    /* ── Top bar ─────────────────────────────────────────────────────────── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: #fff;
      border-bottom: 1px solid #e8e4dc;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
      transition: transform .3s ease;
    }

    .nav-left { display: flex; gap: 8px; }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f4f1eb;
      border: 1px solid #ddd9d0;
      border-radius: 8px;
      padding: 7px 13px;
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 500;
      color: #1a1a1a;
      cursor: pointer;
      transition: background .12s;
      white-space: nowrap;
    }
    .nav-btn:hover  { background: #ebe7df; }
    .nav-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

    .nav-btn .chevron {
      font-size: 9px;
      opacity: .5;
      transition: transform .2s;
    }
    .nav-btn.active .chevron { transform: rotate(180deg); opacity: .7; }

    /* ── Bottom taskbar ───────────────────────────────────────────────────── */
    .taskbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      background: #fff;
      border-top: 1px solid #e8e4dc;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      box-shadow: 0 -1px 4px rgba(0,0,0,.05);
      transition: transform .3s ease;
    }

    .taskbar-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 12px;
      border-radius: 8px;
      transition: background .12s;
      color: #1a1a1a;
    }
    .taskbar-btn:hover { background: #f4f1eb; }
    .taskbar-btn.active { color: #5a3e28; }

    .taskbar-btn .tb-icon { font-size: 20px; line-height: 1; }
    .taskbar-btn .tb-label {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .03em;
      color: inherit;
    }

    /* ── Chapter nav buttons (prev / next) ────────────────────────────────── */
    .ch-nav {
      position: fixed;
      bottom: 64px;   /* just above taskbar */
      z-index: 99;
      transition: transform .3s ease, opacity .3s ease;
    }
    .ch-nav-prev { left: 16px; }
    .ch-nav-next { right: 16px; }

    .ch-nav-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid #ddd9d0;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1a1a;
      transition: background .12s, opacity .15s;
    }
    .ch-nav-btn:hover  { background: #f4f1eb; }
    .ch-nav-btn:active { background: #e8e4dc; }
    .ch-nav-btn:disabled {
      opacity: .25;
      cursor: default;
      background: #fff;
    }

    .ch-nav.chrome-hide-bottom { transform: translateY(110%); }

    /* ── Popup overlay ───────────────────────────────────────────────────── */
    .popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
    }
    .popup-overlay.open { display: block; }

    /* ── Book / chapter panel ─────────────────────────────────────────────── */
    .book-panel {
      position: absolute;
      top: 52px;
      left: 20px;
      width: 300px;
      max-height: calc(100vh - 72px);
      overflow-y: auto;
      background: #fff;
      border: 1px solid #ddd9d0;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
      z-index: 201;
    }
    .book-panel::-webkit-scrollbar { width: 5px; }
    .book-panel::-webkit-scrollbar-track { background: transparent; }
    .book-panel::-webkit-scrollbar-thumb { background: #d0ccc4; border-radius: 3px; }

    .testament-label {
      position: sticky;
      top: 0;
      background: #fff;
      padding: 10px 14px 5px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #bbb;
      border-bottom: 1px solid #f0ece4;
    }

    .book-row { border-bottom: 1px solid #f0ece4; }
    .book-row:last-child { border-bottom: none; }

    .book-btn {
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      padding: 9px 14px;
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      cursor: pointer;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background .1s;
    }
    .book-btn:hover    { background: #f8f5f0; }
    .book-btn.expanded { background: #f4f1eb; font-weight: 600; }

    .expand-arrow {
      font-size: 10px;
      color: #bbb;
      transition: transform .18s;
      flex-shrink: 0;
    }
    .book-btn.expanded .expand-arrow { transform: rotate(90deg); color: #888; }

    .chapter-picker {
      display: none;
      flex-wrap: wrap;
      gap: 5px;
      padding: 8px 14px 12px;
      background: #f8f5f0;
    }
    .chapter-picker.open { display: flex; }

    .ch-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #ddd9d0;
      border-radius: 7px;
      background: #fff;
      font-size: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      cursor: pointer;
      color: #333;
      transition: background .1s, border-color .1s, color .1s;
      flex-shrink: 0;
    }
    .ch-btn:hover   { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .ch-btn.current { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

    /* ── Version panel ────────────────────────────────────────────────────── */
    .version-panel {
      position: absolute;
      top: 52px;
      left: 20px;
      min-width: 220px;
      background: #fff;
      border: 1px solid #ddd9d0;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
      overflow: hidden;
      z-index: 201;
    }

    .version-header {
      padding: 10px 14px 6px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #bbb;
      border-bottom: 1px solid #f0ece4;
    }

    .version-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid #f0ece4;
      transition: background .1s;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .version-item:last-child { border-bottom: none; }
    .version-item:hover    { background: #f8f5f0; }
    .version-item.selected { background: #f4f1eb; }

    .v-abbr { font-size: 14px; font-weight: 700; min-width: 44px; color: #1a1a1a; }
    .v-name  { font-size: 13px; color: #777; flex: 1; }
    .v-check { font-size: 14px; color: #1a1a1a; }

    /* ── Reader ──────────────────────────────────────────────────────────── */
    .reader-wrap {
      max-width: 660px;
      margin: 0 auto;
      padding: 40px 24px 60px;
      /* horizontal swipe container */
      overflow-x: hidden;
    }

    .reader-book {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 4px;
    }

    .reader-chapter {
      font-size: 52px;
      font-weight: 300;
      line-height: 1;
      letter-spacing: -2px;
      color: #1a1a1a;
      margin-bottom: 36px;
    }

    .verse-line {
      display: inline;
      line-height: 1.95;
      font-size: 18px;
    }

    .vnum {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 10px;
      font-weight: 700;
      color: #bbb;
      vertical-align: super;
      line-height: 0;
      margin-right: 3px;
      user-select: none;
    }

    /* ── Loading / error ─────────────────────────────────────────────────── */
    .state-msg {
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #bbb;
      padding: 80px 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: block;
      width: 22px;
      height: 22px;
      border: 2px solid #e8e4dc;
      border-top-color: #aaa;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      margin: 0 auto 12px;
    }

    /* ── Swipe slide animation ───────────────────────────────────────────── */
    @keyframes slide-in-right  { from { transform: translateX( 40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slide-in-left   { from { transform: translateX(-40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .slide-in-right { animation: slide-in-right .22s ease; }
    .slide-in-left  { animation: slide-in-left  .22s ease; }
  </style>
</head>
<body>

<!-- ── Top bar ─────────────────────────────────────────────────────────────── -->
<nav class="topbar" id="topbar">
  <div class="nav-left">
    <button class="nav-btn" id="btn-book">
      <span id="lbl-book">Genesis 1</span>
      <span class="chevron">▼</span>
    </button>
    <button class="nav-btn" id="btn-version">
      <span id="lbl-version">WEB</span>
      <span class="chevron">▼</span>
    </button>
  </div>
</nav>

<!-- ── Book / chapter popup ───────────────────────────────────────────────── -->
<div class="popup-overlay" id="book-overlay">
  <div class="book-panel" id="book-panel">
    <div class="state-msg"><span class="spinner"></span>Loading…</div>
  </div>
</div>

<!-- ── Version popup ──────────────────────────────────────────────────────── -->
<div class="popup-overlay" id="ver-overlay">
  <div class="version-panel" id="ver-panel">
    <div class="version-header">Translation</div>
  </div>
</div>

<!-- ── Chapter reader ─────────────────────────────────────────────────────── -->
<div class="reader-wrap" id="reader-wrap">
  <div id="reader"><div class="state-msg"><span class="spinner"></span></div></div>
</div>

<!-- ── Prev / next chapter buttons ───────────────────────────────────────── -->
<div class="ch-nav ch-nav-prev" id="ch-nav-prev">
  <button class="ch-nav-btn" id="btn-prev" title="Previous chapter">‹</button>
</div>
<div class="ch-nav ch-nav-next" id="ch-nav-next">
  <button class="ch-nav-btn" id="btn-next" title="Next chapter">›</button>
</div>

<!-- ── Bottom taskbar ─────────────────────────────────────────────────────── -->
<div class="taskbar" id="taskbar">
  <button class="taskbar-btn active" id="tb-bible">
    <span class="tb-icon">📖</span>
    <span class="tb-label">Bible</span>
  </button>
</div>

<script>
'use strict';

const API = '';

const state = {
  books:        [],
  translations: [],
  book:         null,
  chapter:      1,
  translation:  'WEB',
  expanded:     null,
};

// ── Bootstrap ──────────────────────────────────────────────────────────────

async function init() {
  const [books, translations] = await Promise.all([
    fetch(`${API}/api/v1/books`).then(r => r.json()),
    fetch(`${API}/api/v1/translations`).then(r => r.json()).catch(() => [
      { id: 'WEB', name: 'World English Bible' },
    ]),
  ]);
  state.books        = books;
  state.translations = translations;
  state.book         = books.find(b => b.book_number === 1);
  loadChapter();
}

// ── Chapter loader ─────────────────────────────────────────────────────────

async function loadChapter(direction = null) {
  updateNavLabels();
  updateChapterNavButtons();

  const reader = document.getElementById('reader');
  reader.innerHTML = `<div class="state-msg"><span class="spinner"></span></div>`;

  const url = `${API}/api/v1/chapters/${encodeURIComponent(state.book.name)}/${state.chapter}?translation=${state.translation}`;
  let data;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(res.status);
    data = await res.json();
  } catch {
    reader.innerHTML = `<div class="state-msg">Could not load chapter.</div>`;
    return;
  }

  let html = `
    <div class="reader-book">${data.book}</div>
    <div class="reader-chapter">${data.chapter}</div>
    <div>
  `;
  for (const v of data.verses) {
    html += `<span class="verse-line"><sup class="vnum">${v.verse}</sup>${v.text} </span>`;
  }
  html += `</div>`;
  reader.innerHTML = html;

  // Slide animation
  if (direction === 'next') reader.classList.add('slide-in-right');
  if (direction === 'prev') reader.classList.add('slide-in-left');
  reader.addEventListener('animationend', () => {
    reader.classList.remove('slide-in-right', 'slide-in-left');
  }, { once: true });

  window.scrollTo({ top: 0 });
  showChrome();
}

function updateNavLabels() {
  document.getElementById('lbl-book').textContent    = `${state.book.name} ${state.chapter}`;
  document.getElementById('lbl-version').textContent = state.translation;
}

// ── Chapter navigation ─────────────────────────────────────────────────────

function isFirstChapter() {
  return state.book.book_number === 1 && state.chapter === 1;
}
function isLastChapter() {
  return state.book.book_number === 66 && state.chapter === state.book.total_chapters;
}

function updateChapterNavButtons() {
  document.getElementById('btn-prev').disabled = isFirstChapter();
  document.getElementById('btn-next').disabled = isLastChapter();
}

function goPrev() {
  if (isFirstChapter()) return;
  if (state.chapter > 1) {
    state.chapter--;
  } else {
    state.book    = state.books.find(b => b.book_number === state.book.book_number - 1);
    state.chapter = state.book.total_chapters;
  }
  loadChapter('prev');
}

function goNext() {
  if (isLastChapter()) return;
  if (state.chapter < state.book.total_chapters) {
    state.chapter++;
  } else {
    state.book    = state.books.find(b => b.book_number === state.book.book_number + 1);
    state.chapter = 1;
  }
  loadChapter('next');
}

document.getElementById('btn-prev').addEventListener('click', goPrev);
document.getElementById('btn-next').addEventListener('click', goNext);

// ── Auto-hide chrome on scroll ─────────────────────────────────────────────

let lastScrollY   = 0;
let chromeVisible = true;
let scrollTimer   = null;

function showChrome() {
  if (chromeVisible) return;
  chromeVisible = true;
  document.getElementById('topbar').classList.remove('chrome-hide-top');
  document.getElementById('taskbar').classList.remove('chrome-hide-bottom');
  document.getElementById('ch-nav-prev').classList.remove('chrome-hide-bottom');
  document.getElementById('ch-nav-next').classList.remove('chrome-hide-bottom');
}

function hideChrome() {
  if (!chromeVisible) return;
  // Don't hide while a popup is open
  if (document.getElementById('book-overlay').classList.contains('open')) return;
  if (document.getElementById('ver-overlay').classList.contains('open')) return;
  chromeVisible = false;
  document.getElementById('topbar').classList.add('chrome-hide-top');
  document.getElementById('taskbar').classList.add('chrome-hide-bottom');
  document.getElementById('ch-nav-prev').classList.add('chrome-hide-bottom');
  document.getElementById('ch-nav-next').classList.add('chrome-hide-bottom');
}

window.addEventListener('scroll', () => {
  const y = window.scrollY;
  const delta = y - lastScrollY;

  if (delta > 6 && y > 80) {
    hideChrome();
  } else if (delta < -6) {
    showChrome();
  }

  lastScrollY = y;

  // Also show chrome when user reaches top
  if (y < 10) showChrome();
}, { passive: true });

// ── Swipe left/right ───────────────────────────────────────────────────────

let touchStartX = 0;
let touchStartY = 0;

document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  // Only trigger if clearly horizontal (more X than Y, and far enough)
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx < 0) goNext();
    else        goPrev();
  }
}, { passive: true });

// ── Book popup ─────────────────────────────────────────────────────────────

function openBookPopup() {
  document.getElementById('btn-book').classList.add('active');
  buildBookPanel();
  document.getElementById('book-overlay').classList.add('open');
}

function closeBookPopup() {
  document.getElementById('book-overlay').classList.remove('open');
  document.getElementById('btn-book').classList.remove('active');
}

function buildBookPanel() {
  const panel = document.getElementById('book-panel');
  const ot = state.books.filter(b => b.testament === 'OT');
  const nt = state.books.filter(b => b.testament === 'NT');
  panel.innerHTML =
    buildTestamentBlock('Old Testament', ot) +
    buildTestamentBlock('New Testament', nt);

  panel.querySelectorAll('.book-btn').forEach(btn => {
    btn.addEventListener('click', () => toggleExpand(+btn.dataset.n));
  });
  panel.querySelectorAll('.ch-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      pickChapter(+btn.dataset.n, +btn.dataset.c);
    });
  });

  if (state.book) {
    const btn = panel.querySelector(`.book-btn[data-n="${state.book.book_number}"]`);
    const cp  = panel.querySelector(`#cp-${state.book.book_number}`);
    if (btn) btn.classList.add('expanded');
    if (cp)  cp.classList.add('open');
    state.expanded = state.book.book_number;
    requestAnimationFrame(() => btn?.scrollIntoView({ block: 'center' }));
  }
}

function buildTestamentBlock(label, books) {
  let h = `<div class="testament-label">${label}</div>`;
  for (const b of books) {
    h += `
      <div class="book-row">
        <button class="book-btn" data-n="${b.book_number}">
          <span>${b.name}</span>
          <span class="expand-arrow">▶</span>
        </button>
        <div class="chapter-picker" id="cp-${b.book_number}">
          ${buildChapters(b)}
        </div>
      </div>`;
  }
  return h;
}

function buildChapters(book) {
  let h = '';
  for (let c = 1; c <= book.total_chapters; c++) {
    const cur = state.book?.book_number === book.book_number && state.chapter === c;
    h += `<button class="ch-btn${cur ? ' current' : ''}" data-n="${book.book_number}" data-c="${c}">${c}</button>`;
  }
  return h;
}

function toggleExpand(bookNum) {
  const panel = document.getElementById('book-panel');
  if (state.expanded === bookNum) {
    panel.querySelector(`.book-btn[data-n="${bookNum}"]`)?.classList.remove('expanded');
    panel.querySelector(`#cp-${bookNum}`)?.classList.remove('open');
    state.expanded = null;
    return;
  }
  if (state.expanded !== null) {
    panel.querySelector(`.book-btn[data-n="${state.expanded}"]`)?.classList.remove('expanded');
    panel.querySelector(`#cp-${state.expanded}`)?.classList.remove('open');
  }
  const btn = panel.querySelector(`.book-btn[data-n="${bookNum}"]`);
  const cp  = panel.querySelector(`#cp-${bookNum}`);
  btn?.classList.add('expanded');
  cp?.classList.add('open');
  state.expanded = bookNum;
  requestAnimationFrame(() => btn?.scrollIntoView({ block: 'nearest', behavior: 'smooth' }));
}

function pickChapter(bookNum, chapter) {
  state.book    = state.books.find(b => b.book_number === bookNum);
  state.chapter = chapter;
  state.expanded = null;
  closeBookPopup();
  loadChapter();
}

// ── Version popup ──────────────────────────────────────────────────────────

function openVersionPopup() {
  const btnRect = document.getElementById('btn-version').getBoundingClientRect();
  const panel   = document.getElementById('ver-panel');
  panel.style.left = btnRect.left + 'px';

  let h = `<div class="version-header">Translation</div>`;
  for (const t of state.translations) {
    const sel = t.id === state.translation;
    h += `
      <div class="version-item${sel ? ' selected' : ''}" data-id="${t.id}">
        <span class="v-abbr">${t.id}</span>
        <span class="v-name">${t.name}</span>
        ${sel ? '<span class="v-check">✓</span>' : ''}
      </div>`;
  }
  panel.innerHTML = h;
  panel.querySelectorAll('.version-item').forEach(el => {
    el.addEventListener('click', () => pickTranslation(el.dataset.id));
  });
  document.getElementById('btn-version').classList.add('active');
  document.getElementById('ver-overlay').classList.add('open');
}

function closeVersionPopup() {
  document.getElementById('ver-overlay').classList.remove('open');
  document.getElementById('btn-version').classList.remove('active');
}

function pickTranslation(id) {
  state.translation = id;
  closeVersionPopup();
  loadChapter();
}

// ── Event wiring ───────────────────────────────────────────────────────────

document.getElementById('btn-book').addEventListener('click', e => {
  e.stopPropagation();
  closeVersionPopup();
  document.getElementById('book-overlay').classList.contains('open')
    ? closeBookPopup() : openBookPopup();
});

document.getElementById('btn-version').addEventListener('click', e => {
  e.stopPropagation();
  closeBookPopup();
  document.getElementById('ver-overlay').classList.contains('open')
    ? closeVersionPopup() : openVersionPopup();
});

document.getElementById('book-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeBookPopup();
});
document.getElementById('ver-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeVersionPopup();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape')     { closeBookPopup(); closeVersionPopup(); }
  if (e.key === 'ArrowRight') goNext();
  if (e.key === 'ArrowLeft')  goPrev();
});

init();
</script>
</body>
</html>
